<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>RepoMind</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 980px;
      margin: 32px auto;
      padding: 0 20px;
      background: #f7f7f8;
      color: #222;
    }

    h1 {
      margin-bottom: 6px;
    }

    h2 {
      margin-top: 0;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      margin-top: 8px;
      margin-bottom: 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 64px;
      max-height: 140px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .status {
      color: #666;
      margin-top: 8px;
      font-size: 14px;
    }

    .markdown-body {
      line-height: 1.75;
      font-size: 15px;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      margin-top: 18px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .markdown-body h1 {
      font-size: 24px;
    }

    .markdown-body h2 {
      font-size: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }

    .markdown-body h3 {
      font-size: 17px;
    }

    .markdown-body p {
      margin: 8px 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 24px;
    }

    .markdown-body code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: Menlo, Monaco, Consolas, monospace;
      font-size: 90%;
    }

    .markdown-body pre {
      background: #f0f0f0;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
    }

    #reportOutput {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 18px;
      max-height: 520px;
      overflow-y: auto;
    }

    .chat-card {
      padding: 0;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }

    .chat-header h2 {
      margin: 0;
    }

    .chat-window {
      height: 520px;
      overflow-y: auto;
      padding: 20px;
      background: #fafafa;
    }

    .empty-chat {
      color: #888;
      text-align: center;
      margin-top: 180px;
    }

    .message {
      display: flex;
      margin-bottom: 18px;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 78%;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 15px;
      word-break: break-word;
    }

    .user .bubble {
      background: #111;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: white;
      border: 1px solid #e6e6e6;
      border-bottom-left-radius: 4px;
    }

    .assistant .bubble .markdown-body {
      background: transparent;
    }

    .chat-input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid #eee;
      background: white;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input-row textarea {
      margin: 0;
      flex: 1;
    }

    .chat-input-row button {
      height: 44px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <h1>RepoMind</h1>
  <div class="subtitle">GitHub 开源项目理解与问答助手</div>

  <div class="card">
    <h2>1. 分析 GitHub 项目</h2>
    <input id="repoUrl" placeholder="输入 GitHub URL，例如：https://github.com/mco-org/squad" />
    <button id="analyzeBtn" onclick="analyzeRepo()">分析项目</button>
    <div id="analyzeStatus" class="status"></div>
  </div>

  <div class="card">
    <h2>项目导读</h2>
    <div id="reportOutput" class="markdown-body">分析完成后，这里会显示 AI 项目导读。</div>
  </div>

  <div class="card chat-card">
    <div class="chat-header">
      <h2>2. 围绕项目对话</h2>
      <div id="askStatus" class="status">分析项目后即可开始提问。</div>
    </div>

    <div id="chatWindow" class="chat-window">
      <div class="empty-chat">这里会显示你和 RepoMind 的连续对话。</div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea id="question" rows="2" placeholder="例如：这个项目的任务是怎么存储的？"></textarea>
        <button id="askBtn" onclick="askQuestion()">发送</button>
      </div>
    </div>
  </div>

  <script>
    function renderMarkdown(text) {
      const html = marked.parse(text || "");
      return DOMPurify.sanitize(html);
    }

    function escapeHtml(text) {
      return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function scrollChatToBottom() {
      const chatWindow = document.getElementById("chatWindow");
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function renderChatHistory(chatHistory) {
      const chatWindow = document.getElementById("chatWindow");

      if (!chatHistory || chatHistory.length === 0) {
        chatWindow.innerHTML = `<div class="empty-chat">这里会显示你和 RepoMind 的连续对话。</div>`;
        return;
      }

      const html = chatHistory.map((turn) => {
        return `
          <div class="message user">
            <div class="bubble">${escapeHtml(turn.question || "")}</div>
          </div>
          <div class="message assistant">
            <div class="bubble">
              <div class="markdown-body">${renderMarkdown(turn.answer || "")}</div>
            </div>
          </div>
        `;
      }).join("");

      chatWindow.innerHTML = html;
      scrollChatToBottom();
    }

    function addTemporaryUserMessage(question) {
      const chatWindow = document.getElementById("chatWindow");

      if (chatWindow.querySelector(".empty-chat")) {
        chatWindow.innerHTML = "";
      }

      chatWindow.innerHTML += `
        <div class="message user">
          <div class="bubble">${escapeHtml(question)}</div>
        </div>
        <div class="message assistant" id="loadingMessage">
          <div class="bubble">正在回答...</div>
        </div>
      `;

      scrollChatToBottom();
    }

    async function analyzeRepo() {
      const repoUrl = document.getElementById("repoUrl").value.trim();
      const button = document.getElementById("analyzeBtn");
      const status = document.getElementById("analyzeStatus");
      const reportOutput = document.getElementById("reportOutput");
      const askStatus = document.getElementById("askStatus");

      if (!repoUrl) {
        alert("请输入 GitHub URL");
        return;
      }

      button.disabled = true;
      status.innerText = "正在分析项目，请稍等...";
      askStatus.innerText = "项目分析中，暂时不能提问。";
      reportOutput.innerHTML = "正在生成项目导读...";
      renderChatHistory([]);

      try {
        const response = await fetch("/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ repo_url: repoUrl }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "分析失败");
        }

        status.innerText = `分析完成：${data.project_name}`;
        askStatus.innerText = "可以开始围绕这个项目提问。";
        reportOutput.innerHTML = renderMarkdown(data.ai_report);
        renderChatHistory(data.chat_history);
      } catch (error) {
        status.innerText = "分析失败";
        askStatus.innerText = "请先重新分析项目。";
        reportOutput.innerText = error.message;
      } finally {
        button.disabled = false;
      }
    }

    async function askQuestion() {
      const questionInput = document.getElementById("question");
      const question = questionInput.value.trim();
      const button = document.getElementById("askBtn");
      const status = document.getElementById("askStatus");

      if (!question) {
        alert("请输入问题");
        return;
      }

      button.disabled = true;
      status.innerText = "正在检索上下文并生成回答...";
      questionInput.value = "";

      addTemporaryUserMessage(question);

      try {
        const response = await fetch("/ask-v2", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ question }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "回答失败");
        }

        status.innerText = "回答完成";
        renderChatHistory(data.chat_history);
      } catch (error) {
        status.innerText = "回答失败：" + error.message;

        const loadingMessage = document.getElementById("loadingMessage");
        if (loadingMessage) {
          loadingMessage.innerHTML = `
            <div class="bubble">回答失败：${escapeHtml(error.message)}</div>
          `;
        }
      } finally {
        button.disabled = false;
      }
    }

    document.getElementById("question").addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    });
  </script>
</body>
</html>
